name: Practica CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pruebas-distribuidas-y-monitoreo:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Mostrar informacion del entorno
        run: |
          node -v
          npm -v
          echo "Sistema operativo: $RUNNER_OS"

      - name: Ejecutar pruebas
        run: npm test

